<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - CanteenGo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #FFF0F5 0%, #FFF5E6 50%, #F0F0FF 100%);
            --card: rgba(255,255,255,0.90);
            --card-border: rgba(232,213,245,0.5);
            --text-primary: #1A1A1A;
            --text-secondary: #3A3A3A;
            --text-muted: #606060;
            --input-bg: rgba(255,255,255,0.85);
            --input-border: #E8D5F5;
            --shadow: rgba(184,169,232,0.2);
            --divider: #F0E8FF;
            --feature-color: #3A3A3A;
            --circle1: #E8D5F5;
            --circle2: #FFD3B6;
            --circle3: #A8E6CF;
        }
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #1A1025 0%, #0F1A1A 50%, #1A1A2E 100%);
            --card: rgba(28,20,45,0.93);
            --card-border: rgba(184,169,232,0.22);
            --text-primary: #F2EEF8;
            --text-secondary: #C8B8E8;
            --text-muted: #9A8AB8;
            --input-bg: rgba(40,28,65,0.8);
            --input-border: rgba(184,169,232,0.3);
            --shadow: rgba(0,0,0,0.45);
            --divider: rgba(184,169,232,0.15);
            --feature-color: #C8B8E8;
            --circle1: rgba(184,169,232,0.15);
            --circle2: rgba(255,211,182,0.1);
            --circle3: rgba(168,230,207,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 20px;
            transition: background 0.4s ease;
        }

        .bg-circles { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .circle { position: absolute; border-radius: 50%; animation: floatCircle 18s infinite ease-in-out; opacity: 0.5; }
        .c1 { width: 280px; height: 280px; background: radial-gradient(circle, var(--circle1), transparent); top: -80px; left: -80px; }
        .c2 { width: 200px; height: 200px; background: radial-gradient(circle, var(--circle2), transparent); bottom: 10%; right: -50px; animation-delay: 6s; }
        .c3 { width: 150px; height: 150px; background: radial-gradient(circle, var(--circle3), transparent); top: 40%; left: 5%; animation-delay: 3s; }
        @keyframes floatCircle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .theme-toggle-wrap { position: fixed; top: 20px; right: 20px; z-index: 200; }
        .theme-toggle {
            width: 52px; height: 28px;
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            border-radius: 20px; border: none; cursor: pointer;
            position: relative; transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(184,169,232,0.35);
        }
        [data-theme="dark"] .theme-toggle { background: linear-gradient(135deg, #3D2B6B, #1A3A4A); }
        .toggle-ball {
            width: 22px; height: 22px; border-radius: 50%;
            background: white; position: absolute; top: 3px; left: 3px;
            transition: transform 0.3s ease;
            display: flex; align-items: center; justify-content: center; font-size: 0.68rem;
        }
        [data-theme="dark"] .toggle-ball { transform: translateX(24px); background: #B8A9E8; }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(184,169,232,0.15);
            border: 1px solid rgba(184,169,232,0.3);
            color: #9B8BC8; padding: 10px 14px; border-radius: 50%;
            cursor: pointer; font-size: 1rem;
            transition: all 0.3s ease; text-decoration: none; z-index: 200;
        }
        .back-btn:hover { background: rgba(184,169,232,0.28); color: #9B8BC8; text-decoration: none; transform: scale(1.1); }

        .login-container {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 32px; padding: 48px 40px;
            width: 100%; max-width: 440px; text-align: center;
            box-shadow: 0 20px 60px var(--shadow);
            border: 2px solid var(--card-border);
            position: relative; z-index: 5;
            animation: fadeUp 0.5s ease;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .student-avatar {
            width: 105px; height: 105px;
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            border-radius: 50%; margin: 0 auto 26px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.7rem; color: white;
            box-shadow: 0 14px 35px rgba(184,169,232,0.4);
            animation: avatarBounce 3s infinite;
        }
        @keyframes avatarBounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-12px); } 60% { transform: translateY(-6px); } }

        .login-title {
            font-size: 2.1rem; font-weight: 700;
            background: linear-gradient(135deg, #9B8BC8, #7BC8A4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .login-subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }

        .form-group { margin-bottom: 18px; position: relative; }
        .form-input {
            width: 100%; padding: 15px 18px 15px 50px;
            border: 2px solid var(--input-border); border-radius: 16px;
            font-size: 0.95rem; font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: var(--input-bg); color: var(--text-primary);
        }
        .form-input:focus {
            outline: none; border-color: #B8A9E8;
            box-shadow: 0 0 0 4px rgba(184,169,232,0.15);
            transform: translateY(-2px); background: var(--input-bg);
        }
        .form-input::placeholder { color: var(--text-muted); }
        .input-icon { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: #B8A9E8; font-size: 1rem; }

        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            border: none; border-radius: 40px;
            color: white; font-size: 1rem; font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(184,169,232,0.35);
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(184,169,232,0.5); }

        .register-link { color: var(--text-muted); font-size: 0.92rem; }
        .register-link a { color: #9B8BC8; text-decoration: none; font-weight: 600; }
        .register-link a:hover { color: #7BC8A4; }

        .error-message {
            background: linear-gradient(135deg, #FFB7C5, #FF9EB5);
            color: white; padding: 13px; border-radius: 14px;
            margin-bottom: 18px; font-weight: 600; font-size: 0.88rem;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        .features-preview { margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--divider); }
        .feature-item { display: flex; align-items: center; margin-bottom: 13px; font-size: 0.88rem; color: var(--feature-color); }
        .feature-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; margin-right: 13px; font-size: 0.82rem; flex-shrink: 0;
        }

        @media (max-width: 480px) { .login-container { padding: 35px 24px; } }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div>
    </div>

    <div class="theme-toggle-wrap">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
            <div class="toggle-ball" id="toggleBall"><span id="toggleIcon">☀️</span></div>
        </button>
    </div>

    <a href="{{ url_for('landing_page') }}" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="login-container">
        <div class="student-avatar"><i class="fas fa-graduation-cap"></i></div>
        <h1 class="login-title">Welcome Back! 🌸</h1>
        <p class="login-subtitle">Login to your student account and start ordering</p>

        {% if error %}
        <div class="error-message"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login & Start Ordering</button>
        </form>

        <div class="register-link">New to CanteenGo? <a href="{{ url_for('student_register') }}">Create Account ✨</a></div>

        <div class="features-preview">
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-utensils"></i></div>
                <span>Browse delicious menu with photos</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-shopping-cart"></i></div>
                <span>Easy cart and order management</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-credit-card"></i></div>
                <span>Multiple secure payment options</span>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('toggleIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('canteenTheme', isDark ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('canteenTheme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.addEventListener('DOMContentLoaded', () => { document.getElementById('toggleIcon').textContent = '🌙'; });
            }
        })();
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
