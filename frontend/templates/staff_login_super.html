<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - CanteenGo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #F0FFF8 0%, #F0F0FF 50%, #FFF5E6 100%);
            --card: rgba(255,255,255,0.90);
            --card-border: rgba(168,230,207,0.45);
            --text-primary: #1A1A1A;
            --text-secondary: #3A3A3A;
            --text-muted: #606060;
            --input-bg: rgba(255,255,255,0.85);
            --input-border: rgba(168,230,207,0.5);
            --shadow: rgba(168,230,207,0.2);
            --divider: rgba(168,230,207,0.3);
            --feature-color: #3A3A3A;
            --circle1: #A8E6CF;
            --circle2: #B8D4FF;
            --circle3: #E8D5F5;
        }
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #0F1A14 0%, #1A1A2E 50%, #1A1208 100%);
            --card: rgba(18,28,22,0.93);
            --card-border: rgba(168,230,207,0.18);
            --text-primary: #F0F8F4;
            --text-secondary: #B8E8CC;
            --text-muted: #7A9A88;
            --input-bg: rgba(25,40,30,0.85);
            --input-border: rgba(168,230,207,0.25);
            --shadow: rgba(0,0,0,0.45);
            --divider: rgba(168,230,207,0.15);
            --feature-color: #B8E8CC;
            --circle1: rgba(168,230,207,0.12);
            --circle2: rgba(184,212,255,0.1);
            --circle3: rgba(184,169,232,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 20px;
            transition: background 0.4s ease;
        }

        .bg-circles { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .circle { position: absolute; border-radius: 50%; animation: floatCircle 20s infinite ease-in-out; opacity: 0.45; }
        .c1 { width: 280px; height: 280px; background: radial-gradient(circle, var(--circle1), transparent); top: -70px; right: -70px; }
        .c2 { width: 200px; height: 200px; background: radial-gradient(circle, var(--circle2), transparent); bottom: 8%; left: -50px; animation-delay: 6s; }
        .c3 { width: 150px; height: 150px; background: radial-gradient(circle, var(--circle3), transparent); top: 35%; left: 5%; animation-delay: 3s; }
        @keyframes floatCircle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-22px); } }

        .theme-toggle-wrap { position: fixed; top: 20px; right: 20px; z-index: 200; }
        .theme-toggle {
            width: 52px; height: 28px;
            background: linear-gradient(135deg, #A8E6CF, #B8D4FF);
            border-radius: 20px; border: none; cursor: pointer;
            position: relative; transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(168,230,207,0.35);
        }
        [data-theme="dark"] .theme-toggle { background: linear-gradient(135deg, #1A4A2A, #1A2A4A); }
        .toggle-ball {
            width: 22px; height: 22px; border-radius: 50%;
            background: white; position: absolute; top: 3px; left: 3px;
            transition: transform 0.3s ease;
            display: flex; align-items: center; justify-content: center; font-size: 0.68rem;
        }
        [data-theme="dark"] .toggle-ball { transform: translateX(24px); background: #A8E6CF; }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(168,230,207,0.15);
            border: 1px solid rgba(168,230,207,0.3);
            color: #7BC8A4; padding: 10px 14px; border-radius: 50%;
            cursor: pointer; font-size: 1rem;
            transition: all 0.3s ease; text-decoration: none; z-index: 200;
        }
        .back-btn:hover { background: rgba(168,230,207,0.28); color: #7BC8A4; text-decoration: none; transform: scale(1.1); }

        .login-container {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 32px; padding: 48px 40px;
            width: 100%; max-width: 440px; text-align: center;
            box-shadow: 0 20px 60px var(--shadow);
            border: 2px solid var(--card-border);
            position: relative; z-index: 5;
            animation: fadeUp 0.5s ease;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .staff-avatar {
            width: 105px; height: 105px;
            background: linear-gradient(135deg, #A8E6CF, #B8D4FF);
            border-radius: 50%; margin: 0 auto 26px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.7rem; color: white;
            box-shadow: 0 14px 35px rgba(168,230,207,0.4);
            animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

        .login-title {
            font-size: 2.1rem; font-weight: 700;
            background: linear-gradient(135deg, #7BC8A4, #9B8BC8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .login-subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }

        .form-group { margin-bottom: 18px; position: relative; }
        .form-input {
            width: 100%; padding: 15px 18px 15px 50px;
            border: 2px solid var(--input-border); border-radius: 16px;
            font-size: 0.95rem; font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: var(--input-bg); color: var(--text-primary);
        }
        .form-input:focus {
            outline: none; border-color: #A8E6CF;
            box-shadow: 0 0 0 4px rgba(168,230,207,0.15);
            transform: translateY(-2px);
        }
        .form-input::placeholder { color: var(--text-muted); }
        .input-icon { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: #A8E6CF; font-size: 1rem; }

        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #A8E6CF, #B8D4FF);
            border: none; border-radius: 40px;
            color: white; font-size: 1rem; font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(168,230,207,0.35);
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(168,230,207,0.5); }

        .error-message {
            background: linear-gradient(135deg, #FFB7C5, #FF9EB5);
            color: white; padding: 13px; border-radius: 14px;
            margin-bottom: 18px; font-weight: 600; font-size: 0.88rem;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .staff-features { margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--divider); }
        .feature-item { display: flex; align-items: center; margin-bottom: 13px; font-size: 0.88rem; color: var(--feature-color); }
        .feature-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #A8E6CF, #B8D4FF);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; margin-right: 13px; font-size: 0.82rem; flex-shrink: 0;
        }

        @media (max-width: 480px) { .login-container { padding: 35px 24px; } }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div><div class="circle c2"></div><div class="circle c3"></div>
    </div>

    <div class="theme-toggle-wrap">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
            <div class="toggle-ball" id="toggleBall"><span id="toggleIcon">☀️</span></div>
        </button>
    </div>

    <a href="{{ url_for('landing_page') }}" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="login-container">
        <div class="staff-avatar"><i class="fas fa-utensils"></i></div>
        <h1 class="login-title">Staff Portal 🍀</h1>
        <p class="login-subtitle">Access your dashboard and manage operations</p>

        {% if error %}
        <div class="error-message"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-input" placeholder="Staff Username" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-input" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Access Dashboard</button>
        </form>

        <div class="staff-features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-chart-line"></i></div>
                <span>Advanced analytics and insights</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-tasks"></i></div>
                <span>Order management system</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-users"></i></div>
                <span>Customer service tools</span>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('toggleIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('canteenTheme', isDark ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('canteenTheme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.addEventListener('DOMContentLoaded', () => { document.getElementById('toggleIcon').textContent = '🌙'; });
            }
        })();
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Accessing...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
