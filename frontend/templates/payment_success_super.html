<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed! - CanteenGo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #FFF0F5 0%, #FFF5E6 50%, #F0F0FF 100%);
            --card: rgba(255,255,255,0.92);
            --card-border: rgba(232,213,245,0.6);
            --text-primary: #1A1A1A;
            --text-secondary: #3A3A3A;
            --text-muted: #606060;
            --shadow: rgba(184,169,232,0.2);
            --order-bg: rgba(168,230,207,0.1);
            --order-border: rgba(168,230,207,0.3);
            --circle1: #A8E6CF;
            --circle2: #E8D5F5;
        }
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #1A1025 0%, #0F1A1A 50%, #1A1A2E 100%);
            --card: rgba(28,20,45,0.95);
            --card-border: rgba(184,169,232,0.22);
            --text-primary: #F2EEF8;
            --text-secondary: #C8B8E8;
            --text-muted: #9A8AB8;
            --shadow: rgba(0,0,0,0.45);
            --order-bg: rgba(168,230,207,0.07);
            --order-border: rgba(168,230,207,0.2);
            --circle1: rgba(168,230,207,0.1);
            --circle2: rgba(184,169,232,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh; color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            padding: 30px 20px; position: relative; overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .bg-circles { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .circle { position: absolute; border-radius: 50%; animation: floatCircle 20s infinite ease-in-out; opacity: 0.4; }
        .c1 { width: 300px; height: 300px; background: radial-gradient(circle, var(--circle1), transparent); top: -80px; right: -80px; }
        .c2 { width: 220px; height: 220px; background: radial-gradient(circle, var(--circle2), transparent); bottom: 5%; left: -60px; animation-delay: 6s; }
        @keyframes floatCircle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        /* Floating hearts */
        .heart { position: fixed; pointer-events: none; z-index: 0; animation: floatHeart 4s ease-in forwards; }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        .theme-toggle-wrap { position: fixed; top: 20px; right: 20px; z-index: 200; }
        .theme-toggle {
            width: 52px; height: 28px;
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            border-radius: 20px; border: none; cursor: pointer;
            position: relative; transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(184,169,232,0.35);
        }
        [data-theme="dark"] .theme-toggle { background: linear-gradient(135deg, #3D2B6B, #1A3A4A); }
        .toggle-ball {
            width: 22px; height: 22px; border-radius: 50%;
            background: white; position: absolute; top: 3px; left: 3px;
            transition: transform 0.3s ease;
            display: flex; align-items: center; justify-content: center; font-size: 0.68rem;
        }
        [data-theme="dark"] .toggle-ball { transform: translateX(24px); background: #B8A9E8; }

        .success-container {
            background: var(--card); backdrop-filter: blur(20px);
            border-radius: 32px; padding: 50px 42px;
            text-align: center;
            box-shadow: 0 20px 60px var(--shadow);
            border: 2px solid var(--card-border);
            max-width: 480px; width: 100%;
            position: relative; z-index: 1;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.75); } to { opacity: 1; transform: scale(1); } }

        .success-icon {
            width: 110px; height: 110px;
            background: linear-gradient(135deg, #A8E6CF, #B8D4FF);
            border-radius: 50%; margin: 0 auto 26px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; color: white;
            box-shadow: 0 15px 40px rgba(168,230,207,0.45);
            animation: successBounce 2s infinite;
        }
        @keyframes successBounce {
            0%,100% { transform: translateY(0); }
            40% { transform: translateY(-14px); }
            60% { transform: translateY(-7px); }
        }

        .success-title {
            font-size: 2.1rem; font-weight: 700;
            background: linear-gradient(135deg, #7BC8A4, #9B8BC8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 12px;
        }

        .success-message { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 26px; line-height: 1.6; }

        .order-details {
            background: var(--order-bg);
            border: 1px solid var(--order-border);
            padding: 20px; border-radius: 20px; margin-bottom: 26px;
            transition: background 0.4s ease;
        }
        .order-id { font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
        .estimated-time {
            color: #7BC8A4; font-size: 0.95rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

        .btn {
            flex: 1; padding: 14px 18px; border: none; border-radius: 40px;
            font-weight: 700; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s ease; font-family: 'Poppins', sans-serif; font-size: 0.92rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #C9B8F0, #A8D8EA);
            color: white; box-shadow: 0 8px 22px rgba(184,169,232,0.35);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(184,169,232,0.5); color: white; text-decoration: none; }

        .btn-secondary {
            background: linear-gradient(135deg, #A8E6CF, #B8EDD8);
            color: white; box-shadow: 0 8px 22px rgba(168,230,207,0.35);
        }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(168,230,207,0.5); color: white; text-decoration: none; }

        @media (max-width: 480px) {
            .success-container { padding: 35px 24px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div><div class="circle c2"></div>
    </div>

    <div class="theme-toggle-wrap">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
            <div class="toggle-ball" id="toggleBall"><span id="toggleIcon">☀️</span></div>
        </button>
    </div>

    <div class="success-container">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1 class="success-title">Order Placed! 🎉</h1>
        <p class="success-message">
            Your order has been sent to the kitchen.<br>
            Sit back and relax while we prepare your food! 🌸
        </p>
        <div class="order-details">
            <div class="order-id">Order #{{ order.id }}</div>
            <div class="estimated-time">
                <i class="fas fa-clock"></i> Ready in ~{{ order.estimated_time }} minutes
            </div>
        </div>
        <div class="action-buttons">
            <a href="{{ url_for('student_menu') }}" class="btn btn-primary">
                <i class="fas fa-utensils"></i> Order More
            </a>
            <a href="{{ url_for('student_orders') }}" class="btn btn-secondary">
                <i class="fas fa-history"></i> Track Order
            </a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('toggleIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('canteenTheme', isDark ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('canteenTheme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('toggleIcon').textContent = '🌙';
                });
            }
        })();

        const emojis = ['🌸','💜','🍀','💚','🌷','✨','💫','🎀','🌺','⭐'];
        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
            h.style.animationDuration = (2.5 + Math.random() * 2) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        for (let i = 0; i < 20; i++) setTimeout(spawnHeart, i * 150);
    </script>
</body>
</html>
